global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nexus-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'

  - job_name: 'nexus-websocket'
    static_configs:
      - targets: ['websocket:3001']
    metrics_path: '/metrics'

  - job_name: 'nexus-ai-engine'
    static_configs:
      - targets: ['ai-engine:3002']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
